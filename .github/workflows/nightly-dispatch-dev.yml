name: Nightly Scheduler (Dispatch Dev)

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: nightly-dispatch-dev
  cancel-in-progress: false

jobs:
  dispatch-nightly:
    name: Dispatch Nightly Quality on dev
    runs-on: ubuntu-latest
    steps:
      - name: Trigger nightly-quality.yml on ref dev
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "nightly-quality.yml",
              ref: "dev"
            });
            core.info("Dispatched nightly-quality.yml on ref dev");
