name: Mirror to Codeberg

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  delete:
  workflow_dispatch:

concurrency:
  group: mirror-codeberg
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mirror:
    name: Mirror Git refs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        env:
          CODEBERG_REPO_SSH: ${{ secrets.CODEBERG_REPO_SSH }}
          CODEBERG_SSH_PRIVATE_KEY: ${{ secrets.CODEBERG_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${CODEBERG_REPO_SSH}" ]]; then
            echo "Missing secret: CODEBERG_REPO_SSH"
            exit 1
          fi
          if [[ -z "${CODEBERG_SSH_PRIVATE_KEY}" ]]; then
            echo "Missing secret: CODEBERG_SSH_PRIVATE_KEY"
            exit 1
          fi
          if [[ ! "${CODEBERG_REPO_SSH}" =~ ^(ssh://)?git@codeberg\.org[:/][^/]+/[^/]+(\.git)?$ ]]; then
            echo "Invalid CODEBERG_REPO_SSH format: expected git@codeberg.org:owner/repo.git"
            exit 1
          fi

      - name: Setup SSH key
        env:
          CODEBERG_SSH_PRIVATE_KEY: ${{ secrets.CODEBERG_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${CODEBERG_SSH_PRIVATE_KEY}" > ~/.ssh/codeberg
          chmod 600 ~/.ssh/codeberg
          ssh-keyscan -H codeberg.org >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Validate private key format
        run: |
          set -euo pipefail
          ssh-keygen -y -f ~/.ssh/codeberg >/dev/null

      - name: Verify SSH authentication to Codeberg
        run: |
          set -euo pipefail
          auth_output="$(ssh -T \
            -i ~/.ssh/codeberg \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            git@codeberg.org 2>&1 || true)"
          echo "${auth_output}"
          if ! echo "${auth_output}" | grep -qi "successfully authenticated"; then
            echo "SSH auth failed. Check the public key in Codeberg and CODEBERG_SSH_PRIVATE_KEY in GitHub Secrets."
            exit 1
          fi

      - name: Detach HEAD to allow ref sync
        run: git checkout --detach

      - name: Sync branches and tags from origin
        run: |
          set -euo pipefail
          git fetch --prune origin \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*'

      - name: Verify repository access on Codeberg
        env:
          CODEBERG_REPO_SSH: ${{ secrets.CODEBERG_REPO_SSH }}
        run: |
          set -euo pipefail
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/codeberg -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes'
          git ls-remote "${CODEBERG_REPO_SSH}" >/dev/null

      - name: Push mirror to Codeberg
        env:
          CODEBERG_REPO_SSH: ${{ secrets.CODEBERG_REPO_SSH }}
        run: |
          set -euo pipefail
          git remote add codeberg "${CODEBERG_REPO_SSH}" || git remote set-url codeberg "${CODEBERG_REPO_SSH}"

          export GIT_SSH_COMMAND='ssh -i ~/.ssh/codeberg -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes'

          retry_push() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if (( attempt >= max_attempts )); then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in 30s..."
              sleep 30
              attempt=$((attempt + 1))
            done
          }

          retry_push 3 git push --force --prune codeberg 'refs/heads/*:refs/heads/*'
          retry_push 3 git push --force --prune codeberg 'refs/tags/*:refs/tags/*'
