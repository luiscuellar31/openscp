name: CI (Dev Quick + Main Integration)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quick-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    name: Quick Checks (push to dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libssh2-1-dev libssl-dev \
            qt6-base-dev qt6-svg-dev qt6-tools-dev qt6-tools-dev-tools qt6-l10n-tools \
            libgl1-mesa-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPEN_SCP_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (quick, no integration)
        run: ctest --test-dir build --output-on-failure -LE integration

  pr-main-integration:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    name: Integration Gate (PR to main only)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libssh2-1-dev libssl-dev \
            qt6-base-dev qt6-svg-dev qt6-tools-dev qt6-tools-dev-tools qt6-l10n-tools \
            libgl1-mesa-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install qt libssh2 openssl@3 pkg-config
          echo "$(brew --prefix qt)/bin" >> "$GITHUB_PATH"
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix libssh2)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Setup Linux SFTP integration server
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server
          sudo mkdir -p /run/sshd
          sudo chmod 755 /run/sshd
          sudo ssh-keygen -A

          sudo useradd --create-home --shell /bin/bash openscp_it || true
          # Ubuntu images may leave service users locked; unlock for pubkey auth.
          sudo usermod -U openscp_it || true
          sudo passwd -d openscp_it || true
          sudo chage -E -1 openscp_it || true
          ssh-keygen -t ed25519 -N "" -f /tmp/openscp_it_linux_ed25519 -q
          sudo install -d -o openscp_it -g openscp_it -m 700 /home/openscp_it/.ssh
          sudo install -o openscp_it -g openscp_it -m 600 /tmp/openscp_it_linux_ed25519.pub /home/openscp_it/.ssh/authorized_keys
          sudo install -d -o openscp_it -g openscp_it -m 700 /home/openscp_it/upload

          cat > /tmp/openscp_sshd_config <<'EOF'
          Port 2222
          ListenAddress 127.0.0.1
          Protocol 2
          HostKey /etc/ssh/ssh_host_ed25519_key
          HostKey /etc/ssh/ssh_host_rsa_key
          PubkeyAuthentication yes
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          ChallengeResponseAuthentication no
          UsePAM no
          PermitRootLogin no
          AllowUsers openscp_it
          AuthorizedKeysFile .ssh/authorized_keys
          Subsystem sftp internal-sftp
          PidFile /tmp/openscp_sshd.pid
          LogLevel VERBOSE
          PrintMotd no
          UseDNS no
          EOF

          if ! sudo /usr/sbin/sshd -t -f /tmp/openscp_sshd_config; then
            echo "Invalid sshd config"
            sudo cat /tmp/openscp_sshd.log || true
            exit 1
          fi

          if ! sudo /usr/sbin/sshd -f /tmp/openscp_sshd_config -E /tmp/openscp_sshd.log; then
            echo "Failed to start sshd"
            sudo cat /tmp/openscp_sshd.log || true
            exit 1
          fi

          for i in {1..20}; do
            if (echo > /dev/tcp/127.0.0.1/2222) >/dev/null 2>&1; then
              echo "SFTP integration server is ready"
              break
            fi
            sleep 1
          done

          if ! (echo > /dev/tcp/127.0.0.1/2222) >/dev/null 2>&1; then
            echo "SFTP integration server did not start"
            sudo cat /tmp/openscp_sshd.log || true
            exit 1
          fi

          if ! ssh \
            -i /tmp/openscp_it_linux_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p 2222 \
            openscp_it@127.0.0.1 true; then
            echo "SFTP auth smoke test failed"
            sudo cat /tmp/openscp_sshd.log || true
            exit 1
          fi

      - name: Setup macOS SFTP integration server
        if: runner.os == 'macOS'
        run: |
          RUNNER_USER="$(whoami)"
          sudo ssh-keygen -A

          ssh-keygen -t ed25519 -N "" -f /tmp/openscp_it_ed25519 -q
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          cat /tmp/openscp_it_ed25519.pub > "$HOME/.ssh/openscp_it_authorized_keys"
          chmod 600 "$HOME/.ssh/openscp_it_authorized_keys"

          mkdir -p /tmp/openscp-it-upload
          chmod 700 /tmp/openscp-it-upload

          cat > /tmp/openscp_sshd_mac_config <<EOF
          Port 2222
          ListenAddress 127.0.0.1
          Protocol 2
          HostKey /etc/ssh/ssh_host_ed25519_key
          HostKey /etc/ssh/ssh_host_rsa_key
          PubkeyAuthentication yes
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          ChallengeResponseAuthentication no
          UsePAM no
          PermitRootLogin no
          AllowUsers ${RUNNER_USER}
          AuthorizedKeysFile .ssh/openscp_it_authorized_keys
          Subsystem sftp internal-sftp
          PidFile /tmp/openscp_sshd_mac.pid
          LogLevel VERBOSE
          UseDNS no
          EOF

          sudo /usr/sbin/sshd -f /tmp/openscp_sshd_mac_config -E /tmp/openscp_sshd_mac.log

          for i in {1..20}; do
            if nc -z 127.0.0.1 2222 >/dev/null 2>&1; then
              echo "SFTP integration server is ready"
              break
            fi
            sleep 1
          done

          if ! nc -z 127.0.0.1 2222 >/dev/null 2>&1; then
            echo "SFTP integration server did not start"
            sudo cat /tmp/openscp_sshd_mac.log || true
            exit 1
          fi

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPEN_SCP_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Write HTTP CONNECT proxy helper
        run: |
          cat > /tmp/openscp_http_connect_proxy.py <<'PY'
          import base64
          import os
          import select
          import socket
          import threading

          BIND_HOST = "127.0.0.1"
          BIND_PORT = int(os.environ["IT_HTTP_PROXY_PORT"])
          AUTH_USER = os.environ.get("IT_HTTP_PROXY_USER", "")
          AUTH_PASS = os.environ.get("IT_HTTP_PROXY_PASS", "")
          EXPECTED_AUTH = "Basic " + base64.b64encode(
              f"{AUTH_USER}:{AUTH_PASS}".encode("utf-8")
          ).decode("ascii")


          def parse_authority(authority: str):
              if authority.startswith("["):
                  end = authority.find("]")
                  if end <= 0:
                      raise ValueError("invalid IPv6 authority")
                  host = authority[1:end]
                  rest = authority[end + 1 :]
                  if not rest.startswith(":"):
                      raise ValueError("missing port")
                  return host, int(rest[1:])
              host, port = authority.rsplit(":", 1)
              return host, int(port)


          def tunnel(client: socket.socket, upstream: socket.socket):
              sockets = [client, upstream]
              while True:
                  readable, _, _ = select.select(sockets, [], [], 30.0)
                  if not readable:
                      continue
                  for src in readable:
                      data = src.recv(65536)
                      if not data:
                          return
                      dst = upstream if src is client else client
                      dst.sendall(data)


          def handle(client: socket.socket):
              upstream = None
              try:
                  client.settimeout(10.0)
                  reader = client.makefile("rb")
                  request_line = reader.readline(8192).decode(
                      "iso-8859-1", errors="replace"
                  ).strip()
                  if not request_line:
                      return
                  parts = request_line.split()
                  if len(parts) < 3 or parts[0].upper() != "CONNECT":
                      client.sendall(
                          b"HTTP/1.1 405 Method Not Allowed\r\nConnection: close\r\n\r\n"
                      )
                      return
                  authority = parts[1]
                  headers = {}
                  while True:
                      line = reader.readline(8192)
                      if not line or line in (b"\r\n", b"\n"):
                          break
                      decoded = line.decode("iso-8859-1", errors="replace").strip()
                      if not decoded or ":" not in decoded:
                          continue
                      key, value = decoded.split(":", 1)
                      headers[key.strip().lower()] = value.strip()
                  if headers.get("proxy-authorization", "") != EXPECTED_AUTH:
                      client.sendall(
                          b"HTTP/1.1 407 Proxy Authentication Required\r\n"
                          b"Proxy-Authenticate: Basic realm=\"OpenSCP IT\"\r\n"
                          b"Connection: close\r\n\r\n"
                      )
                      return
                  host, port = parse_authority(authority)
                  upstream = socket.create_connection((host, port), timeout=10.0)
                  client.sendall(
                      b"HTTP/1.1 200 Connection Established\r\nConnection: keep-alive\r\n\r\n"
                  )
                  client.settimeout(None)
                  upstream.settimeout(None)
                  tunnel(client, upstream)
              except Exception:
                  try:
                      client.sendall(
                          b"HTTP/1.1 502 Bad Gateway\r\nConnection: close\r\n\r\n"
                      )
                  except Exception:
                      pass
              finally:
                  try:
                      if upstream is not None:
                          upstream.close()
                  except Exception:
                      pass
                  try:
                      client.close()
                  except Exception:
                      pass


          def main():
              server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
              server.bind((BIND_HOST, BIND_PORT))
              server.listen(64)
              while True:
                  client, _ = server.accept()
                  thread = threading.Thread(target=handle, args=(client,), daemon=True)
                  thread.start()


          if __name__ == "__main__":
              main()
          PY

      - name: Test (Linux, with SFTP integration)
        if: runner.os == 'Linux'
        env:
          OPEN_SCP_IT_SFTP_HOST: 127.0.0.1
          OPEN_SCP_IT_SFTP_PORT: "2222"
          OPEN_SCP_IT_SFTP_USER: openscp_it
          OPEN_SCP_IT_SFTP_KEY: /tmp/openscp_it_linux_ed25519
          OPEN_SCP_IT_REMOTE_BASE: /home/openscp_it/upload
        run: ctest --test-dir build --output-on-failure

      - name: Test (Linux, with SOCKS5 proxy integration)
        if: runner.os == 'Linux'
        env:
          OPEN_SCP_IT_SFTP_HOST: 127.0.0.1
          OPEN_SCP_IT_SFTP_PORT: "2222"
          OPEN_SCP_IT_SFTP_USER: openscp_it
          OPEN_SCP_IT_SFTP_KEY: /tmp/openscp_it_linux_ed25519
          OPEN_SCP_IT_REMOTE_BASE: /home/openscp_it/upload
        run: |
          set -euo pipefail

          ssh \
            -i /tmp/openscp_it_linux_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o ExitOnForwardFailure=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -N -D 127.0.0.1:1081 \
            -p 2222 openscp_it@127.0.0.1 &
          SOCKS_PID=$!
          trap 'kill "$SOCKS_PID" 2>/dev/null || true; wait "$SOCKS_PID" 2>/dev/null || true' EXIT

          for i in {1..20}; do
            if (echo > /dev/tcp/127.0.0.1/1081) >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          if ! (echo > /dev/tcp/127.0.0.1/1081) >/dev/null 2>&1; then
            echo "SOCKS5 proxy tunnel did not start"
            exit 1
          fi

          OPEN_SCP_IT_PROXY_TYPE=socks5 \
          OPEN_SCP_IT_PROXY_HOST=127.0.0.1 \
          OPEN_SCP_IT_PROXY_PORT=1081 \
          ./build/tests/openscp_sftp_integration_tests

      - name: Test (Linux, with HTTP CONNECT proxy integration)
        if: runner.os == 'Linux'
        env:
          OPEN_SCP_IT_SFTP_HOST: 127.0.0.1
          OPEN_SCP_IT_SFTP_PORT: "2222"
          OPEN_SCP_IT_SFTP_USER: openscp_it
          OPEN_SCP_IT_SFTP_KEY: /tmp/openscp_it_linux_ed25519
          OPEN_SCP_IT_REMOTE_BASE: /home/openscp_it/upload
        run: |
          set -euo pipefail
          PROXY_PORT=18081
          PROXY_USER=openscp_proxy
          PROXY_PASS=openscp_proxy_pass

          IT_HTTP_PROXY_PORT="${PROXY_PORT}" \
          IT_HTTP_PROXY_USER="${PROXY_USER}" \
          IT_HTTP_PROXY_PASS="${PROXY_PASS}" \
          python3 /tmp/openscp_http_connect_proxy.py &
          PROXY_PID=$!
          trap 'kill "$PROXY_PID" 2>/dev/null || true; wait "$PROXY_PID" 2>/dev/null || true' EXIT

          for i in {1..40}; do
            if nc -z 127.0.0.1 "${PROXY_PORT}" >/dev/null 2>&1; then
              break
            fi
            sleep 0.25
          done
          if ! nc -z 127.0.0.1 "${PROXY_PORT}" >/dev/null 2>&1; then
            echo "HTTP CONNECT proxy did not start"
            exit 1
          fi

          OPEN_SCP_IT_PROXY_TYPE=http \
          OPEN_SCP_IT_PROXY_HOST=127.0.0.1 \
          OPEN_SCP_IT_PROXY_PORT="${PROXY_PORT}" \
          OPEN_SCP_IT_PROXY_USER="${PROXY_USER}" \
          OPEN_SCP_IT_PROXY_PASS="${PROXY_PASS}" \
          ./build/tests/openscp_sftp_integration_tests

      - name: Test (Linux, with SSH jump integration)
        if: runner.os == 'Linux'
        env:
          OPEN_SCP_IT_SFTP_HOST: 127.0.0.1
          OPEN_SCP_IT_SFTP_PORT: "2222"
          OPEN_SCP_IT_SFTP_USER: openscp_it
          OPEN_SCP_IT_SFTP_KEY: /tmp/openscp_it_linux_ed25519
          OPEN_SCP_IT_REMOTE_BASE: /home/openscp_it/upload
        run: |
          OPEN_SCP_IT_JUMP_HOST=127.0.0.1 \
          OPEN_SCP_IT_JUMP_PORT=2222 \
          OPEN_SCP_IT_JUMP_USER=openscp_it \
          OPEN_SCP_IT_JUMP_KEY=/tmp/openscp_it_linux_ed25519 \
          ./build/tests/openscp_sftp_integration_tests

      - name: Test (macOS, with SFTP integration)
        if: runner.os == 'macOS'
        env:
          OPEN_SCP_IT_SFTP_HOST: 127.0.0.1
          OPEN_SCP_IT_SFTP_PORT: "2222"
          OPEN_SCP_IT_SFTP_KEY: /tmp/openscp_it_ed25519
          OPEN_SCP_IT_REMOTE_BASE: /tmp/openscp-it-upload
        run: |
          OPEN_SCP_IT_SFTP_USER="$(whoami)" \
          ctest --test-dir build --output-on-failure

      - name: Test (macOS, with SOCKS5 proxy integration)
        if: runner.os == 'macOS'
        env:
          OPEN_SCP_IT_SFTP_HOST: 127.0.0.1
          OPEN_SCP_IT_SFTP_PORT: "2222"
          OPEN_SCP_IT_SFTP_KEY: /tmp/openscp_it_ed25519
          OPEN_SCP_IT_REMOTE_BASE: /tmp/openscp-it-upload
        run: |
          set -euo pipefail
          RUNNER_USER="$(whoami)"

          ssh \
            -i /tmp/openscp_it_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o ExitOnForwardFailure=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -N -D 127.0.0.1:1081 \
            -p 2222 "${RUNNER_USER}@127.0.0.1" &
          SOCKS_PID=$!
          trap 'kill "$SOCKS_PID" 2>/dev/null || true; wait "$SOCKS_PID" 2>/dev/null || true' EXIT

          for i in {1..20}; do
            if (echo > /dev/tcp/127.0.0.1/1081) >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          if ! (echo > /dev/tcp/127.0.0.1/1081) >/dev/null 2>&1; then
            echo "SOCKS5 proxy tunnel did not start"
            exit 1
          fi

          OPEN_SCP_IT_SFTP_USER="${RUNNER_USER}" \
          OPEN_SCP_IT_PROXY_TYPE=socks5 \
          OPEN_SCP_IT_PROXY_HOST=127.0.0.1 \
          OPEN_SCP_IT_PROXY_PORT=1081 \
          ./build/tests/openscp_sftp_integration_tests

      - name: Test (macOS, with HTTP CONNECT proxy integration)
        if: runner.os == 'macOS'
        env:
          OPEN_SCP_IT_SFTP_HOST: 127.0.0.1
          OPEN_SCP_IT_SFTP_PORT: "2222"
          OPEN_SCP_IT_SFTP_KEY: /tmp/openscp_it_ed25519
          OPEN_SCP_IT_REMOTE_BASE: /tmp/openscp-it-upload
        run: |
          set -euo pipefail
          RUNNER_USER="$(whoami)"
          PROXY_PORT=18081
          PROXY_USER=openscp_proxy
          PROXY_PASS=openscp_proxy_pass

          IT_HTTP_PROXY_PORT="${PROXY_PORT}" \
          IT_HTTP_PROXY_USER="${PROXY_USER}" \
          IT_HTTP_PROXY_PASS="${PROXY_PASS}" \
          python3 /tmp/openscp_http_connect_proxy.py &
          PROXY_PID=$!
          trap 'kill "$PROXY_PID" 2>/dev/null || true; wait "$PROXY_PID" 2>/dev/null || true' EXIT

          for i in {1..40}; do
            if nc -z 127.0.0.1 "${PROXY_PORT}" >/dev/null 2>&1; then
              break
            fi
            sleep 0.25
          done
          if ! nc -z 127.0.0.1 "${PROXY_PORT}" >/dev/null 2>&1; then
            echo "HTTP CONNECT proxy did not start"
            exit 1
          fi

          OPEN_SCP_IT_SFTP_USER="${RUNNER_USER}" \
          OPEN_SCP_IT_PROXY_TYPE=http \
          OPEN_SCP_IT_PROXY_HOST=127.0.0.1 \
          OPEN_SCP_IT_PROXY_PORT="${PROXY_PORT}" \
          OPEN_SCP_IT_PROXY_USER="${PROXY_USER}" \
          OPEN_SCP_IT_PROXY_PASS="${PROXY_PASS}" \
          ./build/tests/openscp_sftp_integration_tests

      - name: Test (macOS, with SSH jump integration)
        if: runner.os == 'macOS'
        env:
          OPEN_SCP_IT_SFTP_HOST: 127.0.0.1
          OPEN_SCP_IT_SFTP_PORT: "2222"
          OPEN_SCP_IT_SFTP_KEY: /tmp/openscp_it_ed25519
          OPEN_SCP_IT_REMOTE_BASE: /tmp/openscp-it-upload
        run: |
          OPEN_SCP_IT_SFTP_USER="$(whoami)" \
          OPEN_SCP_IT_JUMP_HOST=127.0.0.1 \
          OPEN_SCP_IT_JUMP_PORT=2222 \
          OPEN_SCP_IT_JUMP_USER="$(whoami)" \
          OPEN_SCP_IT_JUMP_KEY=/tmp/openscp_it_ed25519 \
          ./build/tests/openscp_sftp_integration_tests
